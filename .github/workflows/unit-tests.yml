name: Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: astral-sh/ruff-action@v3
      with:
        args: "check"

  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.10"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest-cov requests pydantic
        # Validator tests need bittensor-wallet and oro-sdk; install from
        # the validator lockfile so the test suite exercises the same
        # package versions the validator ships with.
        uv pip install --system --project docker/validator/ -r docker/validator/pyproject.toml

    - name: Run tests with pytest and coverage
      run: |
        pytest tests/ subnet/tests/ --ignore=tests/integration -v --cov=src --cov-report=term-missing --cov-report=html
      env:
        PYTHONPATH: ${{ github.workspace }}
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 7
    
    - name: Check test results
      if: failure()
      run: |
        echo "Tests failed. Please check the output above for details."

