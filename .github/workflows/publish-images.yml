name: Publish Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., v1.0.0 or latest)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/oro-ai/oro

jobs:
  determine-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: determine-tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: proxy
            file: docker/proxy/Dockerfile
            platforms: linux/amd64
          - image: sandbox
            file: docker/sandbox/Dockerfile
            platforms: linux/amd64
          - image: validator
            file: docker/validator/Dockerfile
            platforms: linux/amd64
          - image: search-server
            file: docker/search-server/Dockerfile
            platforms: linux/amd64

    steps:
      - name: Free disk space (search-server base image is ~7GB)
        if: matrix.image == 'search-server'
        run: sudo rm -rf /usr/share/dotnet

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ needs.determine-tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
          build-args: |
            ${{ matrix.image == 'validator' && format('HF_TOKEN={0}', secrets.HF_TOKEN) || '' }}
          platforms: ${{ matrix.platforms }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
