[pytest]
# Add project root to Python path so imports like "from src.agent.proxy_client" work
pythonpath = . src/agent subnet
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Note: When running locally, make sure to use the virtual environment:
#   source .venv/bin/activate
#   pytest tests/ -v
# Or use: .venv/bin/pytest tests/ -v

